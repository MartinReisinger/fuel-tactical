<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Tactical – Spritpreise Österreich vergleichen</title>

    <!-- ── SEO: Primary ──────────────────────────────────────────────────────── -->
    <meta name="description"
          content="Günstige Spritpreise in Österreich finden. Benzin, Diesel und CNG live vergleichen – interaktive Karte mit aktuellen E-Control Preisdaten.">
    <meta name="keywords"
          content="Spritpreise Österreich, Benzinpreise, Dieselpreise, Tankstellen günstig, Super 95, E-Control Sprit, Sprit vergleichen, Fuel Tactical">
    <meta name="author" content="Martin Reisinger">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://fuel-tactical.site/">

    <!-- ── SEO: Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://fuel-tactical.site/">
    <meta property="og:title"       content="Fuel Tactical – Spritpreise Österreich vergleichen">
    <meta property="og:description" content="Günstige Tankstellen in Österreich finden. Live-Preise von E-Control auf einer interaktiven Karte.">
    <meta property="og:locale"      content="de_AT">
    <meta property="og:locale:alternate" content="en_GB">

    <!-- ── SEO: Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary">
    <meta name="twitter:title"       content="Fuel Tactical – Spritpreise Österreich">
    <meta name="twitter:description" content="Günstige Tankstellen live auf der Karte. Benzin & Diesel in Österreich vergleichen.">

    <!-- ── SEO: Structured Data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Fuel Tactical",
        "url": "https://fuel-tactical.site/",
        "description": "Interaktive Karte zum Vergleich von Spritpreisen (Benzin, Diesel, CNG) in Österreich auf Basis der E-Control API.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
        "author": {
            "@type": "Person",
            "name": "Martin Reisinger",
            "address": { "@type": "PostalAddress", "addressCountry": "AT", "addressLocality": "Linz" }
        },
        "inLanguage": ["de-AT", "en"]
    }
    </script>

    <!-- ── Fonts & external CSS ──────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Analytics (GoatCounter – cookieless) -->
    <script data-goatcounter="https://fuel-tactical.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</head>
<body>

<!-- ── CONNECTOR CANVAS ─────────────────────────────────────────────────────── -->
<canvas id="connector-canvas"></canvas>

<!-- ── HEADER ───────────────────────────────────────────────────────────────── -->
<header>
    <div class="brand">FUEL <span>TACTICAL</span> <div class="status-dot"></div></div>
    <div class="header-spacer"></div>

    <!-- Postcode search -->
    <div class="plz-group">
        <input id="plzInput" class="plz-input" type="text" maxlength="10" autocomplete="postal-code">
        <button id="plz-btn" class="plz-btn" onclick="queryPostcode()">SUCHEN</button>
        <span id="plz-error" class="plz-error"></span>
    </div>

    <!-- Fuel selector -->
    <div class="nav-group">
        <span id="fuel-label">TREIBSTOFF</span>
        <select id="fuelSelect" onchange="loadVisibleStations()">
            <option value="SUP">SUPER 95</option>
            <option value="DIE">DIESEL</option>
            <option value="GAS">CNG GAS</option>
        </select>
    </div>

    <!-- Language toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" data-lang="de" onclick="setLang('de')">DE</button>
        <button class="lang-btn"        data-lang="en" onclick="setLang('en')">EN</button>
    </div>

    <!-- Theme toggle -->
    <div class="theme-toggle">
        <button class="theme-btn active" id="theme-dark"  onclick="setTheme('dark')">DARK</button>
        <button class="theme-btn"        id="theme-light" onclick="setTheme('light')">LIGHT</button>
    </div>
</header>

<!-- ── MAIN LAYOUT ──────────────────────────────────────────────────────────── -->
<div id="layout">
    <div id="map" role="application" aria-label="Interaktive Spritpreiskarte Österreich"></div>

    <aside id="sidebar" role="complementary" aria-label="Günstigste Tankstellen">
        <div>
            <div class="sidebar-header" id="visible-count">TOP 5 IM BLICKFELD</div>
            <div class="sidebar-sub"   id="visible-sub">— bewege die karte —</div>
        </div>
        <div class="station-list" id="station-list"></div>

        <div style="margin-top:auto;padding-top:20px;font-family:var(--mono);font-size:8px;color:var(--text-dim);text-align:center;line-height:1.6;">
            <span id="impressum-link" style="cursor:pointer;text-decoration:underline;letter-spacing:1px;"
                  onclick="openImpressum()"
                  onmouseover="this.style.color='#fff'"
                  onmouseout="this.style.color='var(--text-dim)'">IMPRESSUM</span>
        </div>
    </aside>
</div>

<!-- ── MAP LEGEND ───────────────────────────────────────────────────────────── -->
<div class="legend" id="map-legend" style="display:none">
    <span id="leg-label">PREIS-SKALA</span>
    <div class="legend-bar"></div>
    <div class="legend-labels">
        <span id="leg-min">—</span>
        <span id="leg-max">—</span>
    </div>
</div>

<!-- ── DOSSIER MODAL ────────────────────────────────────────────────────────── -->
<div id="modal" role="dialog" aria-modal="true" onclick="closeModal()">
    <div id="dossier" onclick="event.stopPropagation()">
        <div class="d-header">
            <div class="d-id"    id="d-id">NODE ID</div>
            <div class="d-title" id="d-title">STATION NAME</div>
        </div>
        <div class="d-body">
            <div class="d-table" id="d-table"></div>
            <div class="chart-section">
                <div class="chart-tabs">
                    <button class="chart-tab active" onclick="switchPeriod('24h',this)">24H</button>
                    <button class="chart-tab"        onclick="switchPeriod('7d',this)">7 TAGE</button>
                    <button class="chart-tab"        onclick="switchPeriod('30d',this)">MONAT</button>
                    <button class="chart-tab"        onclick="switchPeriod('365d',this)">JAHR</button>
                </div>
                <div class="chart-wrap">
                    <canvas id="price-chart"></canvas>
                </div>
            </div>
        </div>
        <div class="d-footer">
            <a href="#" id="link-google" target="_blank" rel="noopener" class="btn btn-google">GOOGLE MAPS</a>
            <a href="#" id="link-apple"  target="_blank" rel="noopener" class="btn btn-apple">APPLE MAPS</a>
            <button id="btn-close-modal" class="btn btn-secondary" onclick="closeModal()">CLOSE</button>
        </div>
    </div>
</div>

<!-- ── IMPRESSUM MODAL ──────────────────────────────────────────────────────── -->
<div id="impressum-modal" role="dialog" aria-modal="true" onclick="closeImpressum()">
    <div class="impressum-box" onclick="event.stopPropagation()">
        <div class="impressum-title" id="impressum-title">Impressum</div>
        <div class="impressum-body"  id="impressum-body"></div>
        <button id="btn-close-impressum" class="btn btn-secondary" onclick="closeImpressum()" style="width:100%;margin-top:24px;">CLOSE</button>
    </div>
</div>

<!-- ── SCRIPTS (order matters) ──────────────────────────────────────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<!-- App scripts: translations first, then map, then modal, then UI init -->
<script src="i18n/translations.js"></script>
<script src="js/map.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
